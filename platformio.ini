[env:esp32doit-devkit-v1]
platform = espressif32
board = esp32doit-devkit-v1
framework = arduino

upload_speed = 921600
monitor_speed = 115200

lib_deps =
    marcoschwartz/LiquidCrystal_I2C @ ^1.1.4
    adafruit/RTClib @ ^2.1.1

build_flags =
    -D CORE_DEBUG_LEVEL=0

monitor_filters =
    esp32_exception_decoder